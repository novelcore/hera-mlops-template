# Platform config group — LOCAL-DEV FALLBACK.
#
# In the cluster the platform materializes this group from your project's
# pipeline-context ConfigMap, so `cfg.platform.*` is real at run time and you
# never edit it. This vendored copy exists ONLY so `python pipeline.py` and
# `python -m kubecore.compose` work on a laptop with no cluster. The platform
# overrides the searchpath (KUBECORE_PLATFORM_SEARCHPATH) in CI/runtime.
#
# Excluded from the submit form (it is platform-injected, not a developer knob).
checkpoints:
  bucket: "PLACEHOLDER-bucket"
  prefix: "main/checkpoints"
lakefs:
  repository: "PLACEHOLDER-repo"
  endpoint: "http://lakefs.internal.invalid"
mlflow:
  tracking_uri: "http://mlflow.internal.invalid"
