# PR → main: render the WorkflowTemplate and report back.
#
# On every PR to main this renders your pipeline exactly the way the platform
# does (pipeline.py -> enhance -> release-hygiene gate), using a placeholder
# platform context (the real endpoints/secrets are injected in-cluster, never
# in a repo — so a PR check needs no cluster). It then:
#   - sets a commit STATUS CHECK ("wft-render") that gates the PR;
#   - posts/updates a PR COMMENT with the render summary, and on failure the
#     exact error; on success, the Argo UI URL where the pipeline runs once
#     merged + built.
#
# This is a STRUCTURAL render (does the DAG build, do the reads= sections exist,
# is every step declared) — it does not run the pipeline. Runs happen only in
# Argo Workflows after merge (§12).
name: PR — render WorkflowTemplate

on:
  pull_request:
    # Fire on PRs into whichever branch your app develops on. The template repo
    # uses `main`; a seeded ML app's CI branch is typically `dev` — so a PR into
    # either gets the WFT render-validation check. (Argo CI renders on the push
    # after merge; this is the pre-merge safety net.)
    branches: [main, dev]

permissions:
  contents: read
  statuses: write        # set the wft-render commit status
  pull-requests: write   # post/update the PR comment

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install render deps
        run: pip install -e .

      - name: Render + enhance + gate
        id: render
        run: |
          set -o pipefail
          # 1) pipeline.py -> raw WFT (your DAG)
          # 2) enhance with the placeholder local-dev context (structure only —
          #    real platform values are injected in-cluster at release time)
          # 3) the enhancer's own release-hygiene gate runs inside enhance
          {
            python pipeline.py
            python -m kubecore.enhance \
              --raw out/raw-workflow-template.yaml \
              --context kubecore/local-dev/pipeline-context.yaml \
              --catalog kubecore/local-dev/dataset-catalog.yaml \
              --output out/workflow-template.yaml
            # every declared step must have a buildable steps/<dir>/Dockerfile
            # (or the image escape-hatch) — catch a forgotten Dockerfile at PR
            # time, not as a run-time ImagePullBackOff.
            python .github/check_steps.py
          } 2>render.err | tee render.out
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Summarize the rendered WFT
        id: summary
        if: success()
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import yaml
          wft = yaml.safe_load(open("out/workflow-template.yaml"))
          spec = wft["spec"]
          steps = [t["name"] for t in spec["templates"] if "container" in t]
          params = spec.get("arguments", {}).get("parameters", [])
          print(f"steps={len(steps)}")
          print(f"params={len(params)}")
          print("stepnames=" + ",".join(steps))
          PY

      - name: Report render result (status + PR comment)
        if: always()
        uses: actions/github-script@v7
        env:
          ARGO_UI_URL: ${{ vars.ARGO_UI_URL }}
        with:
          script: |
            const fs = require('fs');
            const ok = '${{ steps.render.outcome }}' === 'success';
            const sha = context.payload.pull_request.head.sha;
            const read = (f) => { try { return fs.readFileSync(f, 'utf8').trim(); } catch { return ''; } };

            // 1) commit status check
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner, repo: context.repo.repo, sha,
              state: ok ? 'success' : 'failure',
              context: 'wft-render',
              description: ok ? 'WorkflowTemplate rendered' : 'WorkflowTemplate render FAILED',
            });

            // 2) PR comment (create or update the single marker comment)
            const marker = '<!-- hera-wft-render -->';
            const argo = process.env.ARGO_UI_URL || '';
            let body;
            if (ok) {
              const steps = '${{ steps.summary.outputs.stepnames }}'.split(',').filter(Boolean);
              const dag = steps.map(s => '`' + s + '`').join(' → ');
              const argoLine = argo
                ? `\n**Runs here after merge:** [Argo Workflows UI](${argo}) → \`{app}-pipeline\``
                : `\n_Set the \`ARGO_UI_URL\` repo variable to link the Argo UI here._`;
              body = `${marker}\n### ✅ WorkflowTemplate render OK\n` +
                     `**Steps (${'${{ steps.summary.outputs.steps }}'}):** ${dag}\n` +
                     `**Form parameters:** ${'${{ steps.summary.outputs.params }}'}\n` +
                     argoLine +
                     `\n\n_Structural render only — the pipeline runs in Argo Workflows after merge + image build._`;
            } else {
              const err = (read('render.err') || read('render.out') || 'no output captured').slice(-3000);
              body = `${marker}\n### ❌ WorkflowTemplate render FAILED\n` +
                     `The platform could not render your pipeline. Fix this before merge:\n\n` +
                     '```\n' + err + '\n```\n' +
                     `\n_Common causes: a \`reads=\` section that no longer exists, a bad group default, ` +
                     `a duplicate parameter, or a step folder without a Dockerfile. See DEVELOPER.md §10._`;
            }

            const {data: comments} = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.payload.pull_request.number, body,
              });
            }

            if (!ok) core.setFailed('WorkflowTemplate render failed');
